version: '3.8'

services:
  # Frontend service
  web:
    build:
      context: ./web-notes
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - notes-network

  # Backend API service
  api:
    build:
      context: ./api-notes
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      # Add database connection strings, etc.
    # depends_on:
    #   - db
    networks:
      - notes-network

  # Database service (optional - uncomment when needed)
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: notesuser
  #     POSTGRES_PASSWORD: notespass
  #     POSTGRES_DB: notesdb
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - notes-network

networks:
  notes-network:
    driver: bridge

